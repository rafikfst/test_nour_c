<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Questions — Avène</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/animations.css">
</head>
<body>
<div class="app-layout">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><div class="brand-logo"><div class="brand-icon">💧</div><div class="brand-text"><span class="brand-name">Eau Thermale Avène</span><span class="brand-sub">Formation Platform</span></div></div></div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer"><div class="user-card"><div class="user-avatar" id="userAvatar">A</div><div class="user-info"><div class="user-name" id="userName">Chargement...</div><div class="user-role" id="userRole">—</div></div><button class="btn-logout" onclick="handleLogout()">🚪</button></div></div>
  </aside>

  <main class="main-content">
    <header class="page-header">
      <div>
        <button class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
        <div class="page-title">Banque de Questions</div>
        <div class="page-subtitle">Administration des questions du jeu</div>
      </div>
      <button class="btn btn-primary" onclick="openCreateModal()">+ Nouvelle Question</button>
    </header>

    <div class="page-body">
      <div class="card mb-4">
        <div class="card-body">
          <div class="search-bar">
            <div class="search-input-wrap" style="flex:2">
              <span class="search-icon">🔍</span>
              <input type="text" placeholder="Rechercher dans les questions…" id="searchInput" oninput="filterTable()">
            </div>
            <select class="form-control" id="difficulteFilter" onchange="filterTable()" style="max-width:180px;">
              <option value="">Toutes les difficultés</option>
              <option value="75%">🟢 75% (Facile)</option>
              <option value="50%">🟡 50% (Moyen)</option>
              <option value="25%">🟠 25% (Difficile)</option>
              <option value="1%">🔴 1% (Super Lot)</option>
            </select>
          </div>
        </div>
      </div>

      <div id="tableContainer"><div class="loader"><div class="spinner"></div></div></div>
    </div>
  </main>
</div>

<!-- Create/Edit Modal -->
<div class="modal-overlay" id="questionModal">
  <div class="modal" style="max-width:640px;">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">Nouvelle Question</h3>
      <button class="modal-close" onclick="Modal.close('questionModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label class="form-label">Niveau de difficulté *</label>
        <select id="fDifficulte" class="form-control">
          <option value="75%">🟢 75% — Niveau 1 (Facile)</option>
          <option value="50%">🟡 50% — Niveau 2 (Moyen)</option>
          <option value="25%">🟠 25% — Niveau 3 (Difficile)</option>
          <option value="1%">🔴 1% — Niveau 4 (Super Lot)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Énoncé de la question *</label>
        <textarea id="fEnonce" class="form-control" placeholder="Saisissez la question ici…" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">✅ Blocs corrects (dans l'ordre exact)</label>
        <p class="text-sm text-muted mb-4">Appuyez sur Entrée après chaque mot/bloc. L'ordre est important.</p>
        <div class="chips-input-area" id="blocsCorrects"></div>
      </div>
      <div class="form-group">
        <label class="form-label">❌ Blocs pièges (distracteurs)</label>
        <p class="text-sm text-muted mb-4">Ces mots seront mélangés avec les blocs corrects.</p>
        <div class="chips-input-area" id="blocsPieges"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="Modal.close('questionModal')">Annuler</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveQuestion()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<!-- Preview Modal -->
<div class="modal-overlay" id="previewModal">
  <div class="modal" style="max-width:600px;">
    <div class="modal-header">
      <h3 class="modal-title">Aperçu Question</h3>
      <button class="modal-close" onclick="Modal.close('previewModal')">✕</button>
    </div>
    <div class="modal-body" id="previewBody"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/app.js"></script>
<script src="/js/layout.js"></script>
<script>
let allData = [];
let chipsCorrects, chipsPieges;

async function loadPage() {
  await Auth.init();
  renderLayout();
  allData = await API.get('/api/questions/all') || [];
  renderCards(allData);
}

const diffConfig = {
  '75%': { color: '#27AE60', bg: 'rgba(39,174,96,0.1)', label: 'Niveau 1 — Facile', icon: '🟢' },
  '50%': { color: '#F39C12', bg: 'rgba(243,156,18,0.1)', label: 'Niveau 2 — Moyen', icon: '🟡' },
  '25%': { color: '#E67E22', bg: 'rgba(230,126,34,0.1)', label: 'Niveau 3 — Difficile', icon: '🟠' },
  '1%':  { color: '#E74C3C', bg: 'rgba(231,76,60,0.1)', label: 'Niveau 4 — Super Lot', icon: '🔴' }
};

function renderCards(data) {
  if (!data.length) {
    document.getElementById('tableContainer').innerHTML = `
      <div class="empty-state"><div class="empty-state-icon">❓</div><h4>Aucune question</h4><p>Créez votre première question</p></div>`;
    return;
  }
  document.getElementById('tableContainer').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;">
      ${data.map(q => {
        const cfg = diffConfig[q.difficulte] || {};
        return `
          <div class="card animate-fade-in" style="border-top:4px solid ${cfg.color}">
            <div class="card-header">
              <span class="badge" style="background:${cfg.bg};color:${cfg.color}">${cfg.icon} ${cfg.label}</span>
              <div class="actions-bar">
                <button class="btn btn-icon btn-outline" onclick="previewQuestion(${q.id})" title="Aperçu">👁️</button>
                <button class="btn btn-icon btn-outline" onclick="editItem(${q.id})" title="Modifier">✏️</button>
                <button class="btn btn-icon btn-danger" onclick="deleteItem(${q.id})" title="Supprimer">🗑️</button>
              </div>
            </div>
            <div class="card-body">
              <p style="color:var(--text);font-weight:500;margin-bottom:12px;">${q.enonce}</p>
              <div style="margin-bottom:8px;">
                <span class="text-sm font-bold" style="color:var(--success);">Blocs corrects:</span>
                <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;">
                  ${(q.blocs_corrects || []).map(b => `<span class="chip-tag">${b}</span>`).join('')}
                </div>
              </div>
              <div>
                <span class="text-sm font-bold" style="color:var(--secondary-dark);">Pièges:</span>
                <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;">
                  ${(q.blocs_pieges || []).map(b => `<span class="chip-tag piege">${b}</span>`).join('')}
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const diff = document.getElementById('difficulteFilter').value;
  renderCards(allData.filter(item =>
    (!q || item.enonce.toLowerCase().includes(q)) &&
    (!diff || item.difficulte === diff)
  ));
}

function openCreateModal() {
  document.getElementById('editId').value = '';
  document.getElementById('modalTitle').textContent = 'Nouvelle Question';
  document.getElementById('fEnonce').value = '';
  document.getElementById('fDifficulte').value = '75%';

  document.getElementById('blocsCorrects').innerHTML = '';
  document.getElementById('blocsPieges').innerHTML = '';
  chipsCorrects = new ChipsInput('blocsCorrects', 'correct');
  chipsPieges = new ChipsInput('blocsPieges', 'piege');
  Modal.open('questionModal');
}

function editItem(id) {
  const q = allData.find(x => x.id === id);
  if (!q) return;
  document.getElementById('editId').value = q.id;
  document.getElementById('modalTitle').textContent = 'Modifier la question';
  document.getElementById('fEnonce').value = q.enonce;
  document.getElementById('fDifficulte').value = q.difficulte;

  document.getElementById('blocsCorrects').innerHTML = '';
  document.getElementById('blocsPieges').innerHTML = '';
  chipsCorrects = new ChipsInput('blocsCorrects', 'correct');
  chipsPieges = new ChipsInput('blocsPieges', 'piege');
  (q.blocs_corrects || []).forEach(v => chipsCorrects.add(v));
  (q.blocs_pieges || []).forEach(v => chipsPieges.add(v));
  Modal.open('questionModal');
}

function previewQuestion(id) {
  const q = allData.find(x => x.id === id);
  if (!q) return;
  const cfg = diffConfig[q.difficulte] || {};
  const allBlocs = [...(q.blocs_corrects || []), ...(q.blocs_pieges || [])].sort(() => Math.random() - 0.5);
  document.getElementById('previewBody').innerHTML = `
    <div style="padding:12px;background:${cfg.bg};border-radius:var(--radius-sm);margin-bottom:16px;">
      <span class="badge" style="background:${cfg.bg};color:${cfg.color}">${cfg.icon} ${cfg.label}</span>
    </div>
    <p style="font-size:1rem;font-weight:600;color:var(--text);margin-bottom:20px;">${q.enonce}</p>
    <div style="min-height:60px;border:2px dashed var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
      <span class="text-muted text-sm">Zone de réponse</span>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;padding:16px;background:var(--bg);border-radius:var(--radius-sm);">
      ${allBlocs.map(b => `<span class="word-chip" style="animation:none;">${b}</span>`).join('')}
    </div>
    <hr class="divider">
    <p class="text-sm text-muted"><strong>Réponse correcte:</strong> ${(q.blocs_corrects || []).join(' → ')}</p>
  `;
  Modal.open('previewModal');
}

async function saveQuestion() {
  const id = document.getElementById('editId').value;
  const body = {
    enonce: document.getElementById('fEnonce').value.trim(),
    difficulte: document.getElementById('fDifficulte').value,
    blocs_corrects: chipsCorrects ? chipsCorrects.getValues() : [],
    blocs_pieges: chipsPieges ? chipsPieges.getValues() : []
  };
  if (!body.enonce) { Toast.warning('L\'énoncé est requis'); return; }
  if (!body.blocs_corrects.length) { Toast.warning('Ajoutez au moins un bloc correct'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Enregistrement…';
  try {
    if (id) { await API.put(`/api/questions/${id}`, body); Toast.success('Question mise à jour'); }
    else { await API.post('/api/questions', body); Toast.success('Question créée'); }
    Modal.close('questionModal');
    allData = await API.get('/api/questions/all') || [];
    filterTable();
  } catch (err) { Toast.error(err.message); }
  finally { btn.disabled = false; btn.textContent = '💾 Enregistrer'; }
}

async function deleteItem(id) {
  confirmAction('Supprimer cette question ?', async () => {
    try {
      await API.delete(`/api/questions/${id}`);
      Toast.success('Question supprimée');
      allData = await API.get('/api/questions/all') || [];
      filterTable();
    } catch (err) { Toast.error(err.message); }
  });
}

loadPage();
</script>
</body>
</html>
