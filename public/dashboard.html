<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau de bord — Avène</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/animations.css">
</head>
<body>
<div class="app-layout">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">
        <div class="brand-icon">💧</div>
        <div class="brand-text">
          <span class="brand-name">Eau Thermale Avène</span>
          <span class="brand-sub">Formation Platform</span>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-info">
          <div class="user-name" id="userName">Chargement...</div>
          <div class="user-role" id="userRole">—</div>
        </div>
        <button class="btn-logout" onclick="handleLogout()" title="Déconnexion">🚪</button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="page-header">
      <div>
        <button class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
        <div class="page-title">Tableau de bord</div>
        <div class="page-subtitle">Vue d'ensemble de la plateforme</div>
      </div>
      <div class="thermal-badge">🌊 Plateforme Active</div>
    </header>

    <div class="page-body">
      <!-- Stats Grid -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card primary skeleton" style="height:120px;"></div>
        <div class="stat-card secondary skeleton" style="height:120px;"></div>
        <div class="stat-card success skeleton" style="height:120px;"></div>
        <div class="stat-card warning skeleton" style="height:120px;"></div>
      </div>

      <div class="grid-2" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <!-- Recent Activity -->
        <div class="card animate-fade-in">
          <div class="card-header">
            <h3 class="card-title">📋 Derniers Bilans</h3>
            <a href="/reporting.html" class="btn btn-outline btn-sm">Voir tout</a>
          </div>
          <div class="card-body" id="recentBilans">
            <div class="loader"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- Stock Overview -->
        <div class="card animate-fade-in delay-2">
          <div class="card-header">
            <h3 class="card-title">📦 Stock Tournées Actives</h3>
            <a href="/tournees.html" class="btn btn-outline btn-sm">Gérer</a>
          </div>
          <div class="card-body" id="stockOverview">
            <div class="loader"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="card mt-6 animate-fade-in delay-3">
        <div class="card-header">
          <h3 class="card-title">⚡ Actions Rapides</h3>
        </div>
        <div class="card-body">
          <div style="display:flex;flex-wrap:wrap;gap:12px;">
            <a href="/game.html" class="btn btn-primary btn-lg btn-pulse">🎮 Lancer le Jeu</a>
            <a href="/tournees.html" class="btn btn-secondary btn-lg">🗺️ Nouvelle Tournée</a>
            <a href="/reporting.html" class="btn btn-outline btn-lg">📊 Voir les Rapports</a>
            <a href="/questions.html" class="btn btn-outline btn-lg" data-admin-only>❓ Gérer Questions</a>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/app.js"></script>
<script src="/js/layout.js"></script>
<script>
async function loadDashboard() {
  await Auth.init();
  renderLayout('dashboard');

  // Load stats
  try {
    const [tournees, pharmacies, agents, bilans] = await Promise.all([
      API.get('/api/tournees'),
      API.get('/api/pharmacies'),
      API.get('/api/agents'),
      API.get('/api/reporting')
    ]);

    const visitedCount = (pharmacies || []).filter(p => p.est_visitee).length;
    const won = (agents || []).filter(a => a.statut_jeu?.startsWith('Gagné')).length;
    const totalPlayed = (agents || []).filter(a => a.statut_jeu !== 'Non Joué').length;

    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card primary animate-fade-in">
        <span class="stat-icon">🗺️</span>
        <div class="stat-value">${(tournees||[]).length}</div>
        <div class="stat-label">Tournées créées</div>
      </div>
      <div class="stat-card secondary animate-fade-in delay-1">
        <span class="stat-icon">🏥</span>
        <div class="stat-value">${visitedCount} / ${(pharmacies||[]).length}</div>
        <div class="stat-label">Pharmacies visitées</div>
      </div>
      <div class="stat-card success animate-fade-in delay-2">
        <span class="stat-icon">🏆</span>
        <div class="stat-value">${won}</div>
        <div class="stat-label">Agents gagnants</div>
      </div>
      <div class="stat-card warning animate-fade-in delay-3">
        <span class="stat-icon">📋</span>
        <div class="stat-value">${(bilans||[]).length}</div>
        <div class="stat-label">Bilans enregistrés</div>
      </div>
    `;

    // Recent bilans
    const recent = (bilans || []).slice(0, 5);
    document.getElementById('recentBilans').innerHTML = recent.length ? `
      <div class="table-wrapper">
        <table class="table">
          <thead><tr><th>Agent</th><th>Pharmacie</th><th>Cadeau</th><th>Date</th></tr></thead>
          <tbody>
            ${recent.map(b => `
              <tr>
                <td><strong>${b.nom_agent}</strong></td>
                <td>${b.nom_pharmacie}</td>
                <td><span class="badge ${b.cadeau_assigne ? 'badge-success' : 'badge-muted'}">${b.cadeau_description}</span></td>
                <td class="text-muted">${formatDateTime(b.created_at)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    ` : `<div class="empty-state"><div class="empty-state-icon">📋</div><h4>Aucun bilan</h4><p>Les bilans apparaîtront ici après les sessions de jeu</p></div>`;

    // Stock overview
    const activeTournees = (tournees || []).slice(0, 3);
    document.getElementById('stockOverview').innerHTML = activeTournees.length ? activeTournees.map(t => {
      const stock = t.stock_actuel || {};
      const initial = t.stock_initial || {};
      return `
        <div style="margin-bottom:20px;">
          <div class="flex justify-between items-center mb-4">
            <strong>${t.region}</strong>
            <span class="text-sm text-muted">${formatDate(t.date_debut)} → ${formatDate(t.date_fin)}</span>
          </div>
          ${[['type1','Type 1'],['type2','Type 2'],['type3','Type 3'],['superlot','Super Lot']].map(([key, label]) => {
            const cur = stock[key] || 0;
            const ini = initial[key] || 1;
            const pct = Math.round((cur/ini)*100);
            const cls = pct < 20 ? 'low' : pct < 50 ? 'medium' : '';
            return `
              <div style="margin-bottom:10px;">
                <div class="flex justify-between"><span class="text-sm">${label}</span><span class="text-sm font-bold">${cur} / ${ini}</span></div>
                <div class="stock-bar"><div class="stock-bar-fill ${cls}" style="width:${pct}%"></div></div>
              </div>
            `;
          }).join('')}
        </div>
        <hr class="divider">
      `;
    }).join('') : `<div class="empty-state"><div class="empty-state-icon">📦</div><h4>Aucune tournée</h4><p>Créez une tournée pour gérer les stocks</p></div>`;

  } catch (err) {
    Toast.error('Erreur lors du chargement: ' + err.message);
  }
}

loadDashboard();
</script>
</body>
</html>
